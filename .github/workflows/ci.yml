name: CI — binary-failure gates

# CLAWDOG/110 §3 — every push and PR runs the four binary-failure gates that
# define the architectural contract for this repository:
#   1. test_manifest_fidelity     (Lesson #38 — byte-content discipline)
#   2. test_advisory_boundary     (Lesson #34 — disclaimer at every egress)
#   3. test_phase3a_e2e           (Lesson #37 — production-surface contract)
#   4. test_openapi_drift         (Lesson #35 — spec-vs-code drift)
#
# Lesson #29 (Kit CI hygiene) anchor: subagents do not run pytest locally
# (Phase 3a brief constraint). CI is the canonical execution surface for
# the gates; without CI, the gates are notional.

on:
  push:
    branches:
      - "master"
      - "main"
      - "clawdog/**"
  pull_request:
    branches:
      - "master"
      - "main"

permissions:
  contents: read

jobs:
  lint-and-test:
    name: lint + binary-failure gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Australian locale (Standing Rule #4)
        # Mirrors the production runtime image. Belt-and-braces — none of the
        # current binary-failure gates depend on locale, but Standing Rule #4
        # immutables travel with the build environment.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends locales
          sudo sed -i -e 's/# *en_AU.UTF-8 UTF-8/en_AU.UTF-8 UTF-8/' /etc/locale.gen
          sudo locale-gen en_AU.UTF-8
          sudo update-locale LANG=en_AU.UTF-8

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check api tests

      - name: Binary-failure gate #4 — OpenAPI drift
        # The drift check is run BEFORE pytest so any spec drift surfaces with
        # a clear, named failure (rather than as the slowest pytest line).
        run: |
          make openapi-check

      - name: Binary-failure gates #1–#3 — pytest
        # test_manifest_fidelity   — Lesson #38 anchor
        # test_advisory_boundary   — Lesson #34 anchor
        # test_phase3a_e2e         — Lesson #37 anchor
        # test_openapi_drift       — Lesson #35 anchor (also in pytest, defence-in-depth)
        env:
          LANG: en_AU.UTF-8
          LC_ALL: en_AU.UTF-8
        run: |
          pytest tests/ -v
