# Cloud Run service descriptor — clawdog-calculator-api Phase 3a.
#
# Standing Rule #4 (Fano-Constraint API immutables, rev 16+):
#   - region: australia-southeast1 (matches Fano)
#   - locale: en_AU.UTF-8 (handled in the runtime Dockerfile)
#   - no training inside Cloud Run (this service is invocation-only)
#
# Deploy via `make deploy` (which Andrew runs locally; subagents do NOT
# execute gcloud commands). See deploy/README.md for the manual runbook.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: fbt-calculator-api
  labels:
    # cloud.googleapis.com/* labels are GCP-whitelisted (allow dots + slashes).
    cloud.googleapis.com/location: australia-southeast1
    # GCP label keys outside the cloud.googleapis.com/* namespace must match
    # [a-z]([-_a-z0-9]{0,62})? — no dots, no slashes. Kubernetes-style domain-
    # prefixed keys like `lodgeit.org/canon` fail `gcloud run services replace`
    # with: "At least one label does not conform to GCP naming style"
    # (verified 2026-05-25 03:02 UTC; PR #8 deploy attempt rejected).
    # Renamed to hyphenated form for GCP compliance while preserving the
    # semantic prefix that ties these labels to the lodgeit.org canon set.
    lodgeit-org-component: calculator-constellation
    lodgeit-org-phase: "3a"
    lodgeit-org-canon: "clawdog-109-110"
  annotations:
    run.googleapis.com/launch-stage: GA
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      timeoutSeconds: 60
      serviceAccountName: clawdog-calculator-api@lodgeit-calc-constellation.iam.gserviceaccount.com
      containers:
        - name: api
          image: australia-southeast1-docker.pkg.dev/lodgeit-calc-constellation/clawdog/clawdog-calculator-api:latest
          ports:
            - name: http1
              containerPort: 8000
          resources:
            limits:
              cpu: "1000m"
              memory: "512Mi"
          env:
            - name: FBT_PROLOG_URL
              # The Phase 3a target also runs the Prolog FBT engine on a
              # sibling Cloud Run service in the same region. Phase 3b/3c
              # may consolidate into a sidecar; for now the URL is wired
              # via a deploy-time substitution.
              value: "https://fbt-engine-XXXX-an.a.run.app"
            - name: LODGEIT_FBT_REPO
              # Points the manifest-fidelity helper at the bundled SBRM
              # rate-table tree shipped inside this image (see Dockerfile).
              # _rate_table_root_for() expands this to
              # /app/SBRM_RATE_TABLE/<calc>/<period_id>/. Without this, the
              # resolver falls back to /srv/lodgeit_fbt (no-such-path) and
              # any deemed-dispatch request 500s with bare HTML
              # (Phase 3a deemed-dispatch 500 root cause).
              value: "/app"
            - name: LANG
              value: "en_AU.UTF-8"
            - name: LC_ALL
              value: "en_AU.UTF-8"
          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            timeoutSeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            timeoutSeconds: 5
            periodSeconds: 30
  traffic:
    - percent: 100
      latestRevision: true
